version: "3.9"

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dtac_postgres
    environment:
      POSTGRES_DB: dtac_ir
      POSTGRES_USER: dtac_user
      POSTGRES_PASSWORD: dtac_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dtac_user -d dtac_ir"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dtac_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend ────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: dtac_backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://dtac_user:dtac_password@postgres:5432/dtac_ir
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=change-this-in-production-min-32-characters-please
      - DEBUG=false
      - CAPTURE_INTERFACE=eth0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Network capture requires host network or NET_ADMIN capability
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host   # Required for Scapy to see real network traffic
    volumes:
      - ../ml/models:/app/ml/models:ro   # Mount trained models
      - backend_logs:/app/logs
    restart: unless-stopped

  # ── Frontend ───────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: dtac_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  backend_logs:

networks:
  default:
    driver: bridge
